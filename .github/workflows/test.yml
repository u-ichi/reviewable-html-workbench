name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

      - name: Validate plugin manifests
        run: |
          python3 -m json.tool .claude-plugin/plugin.json >/dev/null
          python3 -m json.tool .codex-plugin/plugin.json >/dev/null

      - name: Check CLI contract
        run: python3 -m scripts.html_review_workbench.cli --help >/dev/null

      - name: Check version consistency
        run: |
          pyproject_version="$(grep -E '^version = ' pyproject.toml | sed -E 's/^version = "([^"]+)"/\1/')"
          claude_plugin_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/plugin.json", encoding="utf-8"))["version"])')"
          codex_plugin_version="$(python3 -c 'import json; print(json.load(open(".codex-plugin/plugin.json", encoding="utf-8"))["version"])')"
          if [ "$pyproject_version" != "$claude_plugin_version" ] || [ "$pyproject_version" != "$codex_plugin_version" ]; then
            echo "Version mismatch:"
            echo "pyproject.toml: $pyproject_version"
            echo ".claude-plugin/plugin.json: $claude_plugin_version"
            echo ".codex-plugin/plugin.json: $codex_plugin_version"
            exit 1
          fi
