name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check generated skill docs
        run: python3 scripts/build_skill_docs.py --check

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

      - name: Validate plugin manifests
        run: |
          python3 -m json.tool .claude-plugin/plugin.json >/dev/null
          python3 -m json.tool .codex-plugin/plugin.json >/dev/null

      - name: Check CLI contract
        run: python3 -m scripts.html_review_workbench.cli --help >/dev/null

      - name: Check version consistency
        run: |
          pyproject_version="$(grep -E '^version = ' pyproject.toml | sed -E 's/^version = "([^"]+)"/\1/')"
          claude_plugin_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/plugin.json", encoding="utf-8"))["version"])')"
          codex_plugin_version="$(python3 -c 'import json; print(json.load(open(".codex-plugin/plugin.json", encoding="utf-8"))["version"])')"
          marketplace_meta_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/marketplace.json", encoding="utf-8"))["metadata"]["version"])')"
          marketplace_plugin_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/marketplace.json", encoding="utf-8"))["plugins"][0]["version"])')"
          mismatch=0
          for name_ver in \
            "pyproject.toml:$pyproject_version" \
            ".claude-plugin/plugin.json:$claude_plugin_version" \
            ".codex-plugin/plugin.json:$codex_plugin_version" \
            "marketplace.json metadata.version:$marketplace_meta_version" \
            "marketplace.json plugins[0].version:$marketplace_plugin_version"; do
            ver="${name_ver#*:}"
            if [ "$ver" != "$pyproject_version" ]; then
              echo "Version mismatch: ${name_ver%%:*} = $ver (expected $pyproject_version)"
              mismatch=1
            fi
          done
          if [ "$mismatch" -eq 1 ]; then exit 1; fi
