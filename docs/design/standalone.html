ass=\"spec-card\"><div class=\"swatch\" style=\"background:var(--ink)\"><\u002Fdiv><span class=\"s-name\">主テキスト<\u002Fspan><span class=\"s-hex\">#232019<\u002Fspan><br><span class=\"s-var\">--ink<\u002Fspan><\u002Fdiv>\n          <div class=\"spec-card\"><div class=\"swatch\" style=\"background:var(--ink-2)\"><\u002Fdiv><span class=\"s-name\">副テキスト<\u002Fspan><span class=\"s-hex\">#5f5b51<\u002Fspan><br><span class=\"s-var\">--ink-2<\u002Fspan><\u002Fdiv>\n          <div class=\"spec-card\"><div class=\"swatch\" style=\"background:var(--line-2)\"><\u002Fdiv><span class=\"s-name\">罫線<\u002Fspan><span class=\"s-hex\">#d6d1c5<\u002Fspan><br><span class=\"s-var\">--line-2<\u002Fspan><\u002Fdiv>\n          <div class=\"spec-card\"><div class=\"swatch\" style=\"background:var(--brand)\"><\u002Fdiv><span class=\"s-name\">構造アクセント<\u002Fspan><span class=\"s-hex\">#2f6093<\u002Fspan><br><span class=\"s-var\">--brand<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <h3 style=\"font-size:14px;color:var(--ink-3);margin:18px 0 8px;\">レビュー状態 — 3 つの色相で識別<\u002Fh3>\n        <div class=\"spec-grid\">\n          <div class=\"spec-card\"><div class=\"swatch\" style=\"background:var(--open)\"><\u002Fdiv><span class=\"s-name\">未対応 / open<\u002Fspan><br><span class=\"s-var\">--open · bg #e9f1f9<\u002Fspan><\u002Fdiv>\n          <div class=\"spec-card\"><div class=\"swatch\" style=\"background:var(--reply)\"><\u002Fdiv><span class=\"s-name\">返信あり / reply<\u002Fspan><br><span class=\"s-var\">--reply · bg #f7efdc<\u002Fspan><\u002Fdiv>\n          <div class=\"spec-card\"><div class=\"swatch\" style=\"background:var(--resolved)\"><\u002Fdiv><span class=\"s-name\">解決済み / resolved<\u002Fspan><br><span class=\"s-var\">--resolved · bg #e9f1ea<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2>タイポグラフィ・スケール<\u002Fh2>\n        <p class=\"s-var\" style=\"margin:0 0 6px;\">UI / 見出し = システム sans（ゴシック） / コード = システム mono。明朝体・Web フォントは使用しない。見出しは太さと字間で階層を作る。<\u002Fp>\n        <div>\n          <div class=\"type-row\"><span class=\"t-spec\">H1 / 30px sans 700<\u002Fspan><span style=\"font-family:var(--font-serif);font-size:30px;font-weight:700;letter-spacing:-.02em;\">文書タイトル Title<\u002Fspan><\u002Fdiv>\n          <div class=\"type-row\"><span class=\"t-spec\">H2 / 21px sans 700<\u002Fspan><span style=\"font-family:var(--font-serif);font-size:21px;font-weight:700;letter-spacing:-.015em;\">セクション見出し<\u002Fspan><\u002Fdiv>\n          <div class=\"type-row\"><span class=\"t-spec\">H3 / 16px sans 650<\u002Fspan><span style=\"font-size:16px;font-weight:650;\">サブ見出し<\u002Fspan><\u002Fdiv>\n          <div class=\"type-row\"><span class=\"t-spec\">Body / 15px · 1.72<\u002Fspan><span style=\"font-size:15px;\">本文テキスト 123 ABC あいう。読みやすさ優先で行間広め。<\u002Fspan><\u002Fdiv>\n          <div class=\"type-row\"><span class=\"t-spec\">Small / 13px<\u002Fspan><span style=\"font-size:13px;color:var(--ink-2)\">補助テキスト・コメント本文<\u002Fspan><\u002Fdiv>\n          <div class=\"type-row\"><span class=\"t-spec\">Mono / 12-13px<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:13px;\">code · 2026-06-11 · ¥285k<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2>スペーシング・スケール<\u002Fh2>\n        <p class=\"s-var\" style=\"margin:0 0 12px;\">4 / 8 / 12 / 16 / 24 / 32 / 48 / 64 px。高密度モードでブロック間隔と行間が縮む。<\u002Fp>\n        <div class=\"space-scale\">\n          <div class=\"s-item\"><div class=\"s-box\" style=\"width:4px;height:4px\"><\u002Fdiv>4<\u002Fdiv>\n          <div class=\"s-item\"><div class=\"s-box\" style=\"width:8px;height:8px\"><\u002Fdiv>8<\u002Fdiv>\n          <div class=\"s-item\"><div class=\"s-box\" style=\"width:12px;height:12px\"><\u002Fdiv>12<\u002Fdiv>\n          <div class=\"s-item\"><div class=\"s-box\" style=\"width:16px;height:16px\"><\u002Fdiv>16<\u002Fdiv>\n          <div class=\"s-item\"><div class=\"s-box\" style=\"width:24px;height:24px\"><\u002Fdiv>24<\u002Fdiv>\n          <div class=\"s-item\"><div class=\"s-box\" style=\"width:32px;height:32px\"><\u002Fdiv>32<\u002Fdiv>\n          <div class=\"s-item\"><div class=\"s-box\" style=\"width:48px;height:48px\"><\u002Fdiv>48<\u002Fdiv>\n          <div class=\"s-item\"><div class=\"s-box\" style=\"width:64px;height:64px\"><\u002Fdiv>64<\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2>ボーダー / シャドウ方針<\u002Fh2>\n        <table class=\"spec-table\">\n          <thead><tr><th>用途<\u002Fth><th>角丸<\u002Fth><th>境界の作り方<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>インラインタグ / pip<\u002Ftd><td class=\"mono\">2px<\u002Ftd><td>塗り or 1px 罫線のみ。影なし<\u002Ftd><\u002Ftr>\n            <tr><td>ボタン / 入力 / セル<\u002Ftd><td class=\"mono\">4px<\u002Ftd><td>1px 罫線。hover で罫線を 1 段濃く<\u002Ftd><\u002Ftr>\n            <tr><td>カード / コメント / 表<\u002Ftd><td class=\"mono\">6px<\u002Ftd><td>1px 罫線 + <code class=\"mono\">--sh-1<\u002Fcode>（極薄）<\u002Ftd><\u002Ftr>\n            <tr><td>用紙面 / コンテナ<\u002Ftd><td class=\"mono\">8px<\u002Ftd><td>罫線主体。影は最小限<\u002Ftd><\u002Ftr>\n            <tr><td>ポップオーバー / 選択中<\u002Ftd><td class=\"mono\">6px<\u002Ftd><td><code class=\"mono\">--sh-3<\u002Fcode> で浮かせる（唯一の強い影）<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p class=\"s-var\" style=\"margin-top:10px;\">原則: <strong>境界は罫線、奥行きは控えめな影<\u002Fstrong>。派手なグラデーション・大きな角丸・ドロップシャドウの多用は避ける。影は階層を示す時だけ。<\u002Fp>\n\n        <h2>レビューブロックの状態別デザイン<\u002Fh2>\n        <div class=\"spec-state-row\">\n          <div class=\"spec-card\" style=\"border-left:3px solid var(--open)\">\n            <div class=\"cmt-state\" style=\"color:var(--open);background:var(--open-bg);display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;\"><span class=\"sdot\" style=\"width:6px;height:6px;border-radius:50%;background:currentColor\"><\u002Fspan>未対応 open<\u002Fdiv>\n            <p style=\"font-size:13px;color:var(--ink-2);margin:10px 0 0;\">本文ハイライト=<strong>塗り + 2px 下線（青）<\u002Fstrong>。カードは左 3px 青、不透明度 100%。返信入力＋解決ボタンを表示。<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"spec-card\" style=\"border-left:3px solid var(--reply)\">\n            <div class=\"cmt-state\" style=\"color:var(--reply);background:var(--reply-bg);display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;\"><span class=\"sdot\" style=\"width:6px;height:6px;border-radius:50%;background:currentColor\"><\u002Fspan>返信あり reply<\u002Fdiv>\n            <p style=\"font-size:13px;color:var(--ink-2);margin:10px 0 0;\">ハイライト=<strong>塗り + 2px 下線（琥珀）<\u002Fstrong>。カードに返信スレッド表示（agent 返信はグラデ avatar）。未解決として残る。<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"spec-card\" style=\"border-left:3px solid var(--resolved)\">\n            <div class=\"cmt-state\" style=\"color:var(--resolved);background:var(--resolved-bg);display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;\"><span class=\"sdot\" style=\"width:6px;height:6px;border-radius:50%;background:currentColor\"><\u002Fspan>解決済み resolved<\u002Fdiv>\n            <p style=\"font-size:13px;color:var(--ink-2);margin:10px 0 0;\">ハイライトは<strong>後退（破線下線のみ・塗りなし）<\u002Fstrong>。カードは不透明度 78% に落とし、解決者バナー表示。フィルタで非表示可能。<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"s-var\" style=\"margin-top:12px;\">状態差は <strong>色相 + 塗りの有無 + 不透明度<\u002Fstrong>で表現し、文言の追加に頼らない。未対応＝主張、返信あり＝進行中、解決済み＝後退、という視覚的ヒエラルキー。<\u002Fp>\n\n        <h2>ブロック別の見せ方<\u002Fh2>\n        <table class=\"spec-table\">\n          <thead><tr><th>ブロック<\u002Fth><th>方針<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td><strong>大きな比較表<\u002Fstrong><\u002Ftd><td>先頭列（比較軸）と見出し行を <code class=\"mono\">position:sticky<\u002Fcode> で固定し横スクロール。推奨列は緑の淡い塗りで縦に追える。評価は 5 段階の pip、コストは tabular-nums の等幅数字で桁を揃える。<\u002Ftd><\u002Ftr>\n            <tr><td><strong>callout<\u002Fstrong><\u002Ftd><td>26px アイコン枠 + 本文の 2 カラム grid。info=青 / warn=琥珀 / success=緑、左 3px ボーダー + 淡い地。角丸 6px。<\u002Ftd><\u002Ftr>\n            <tr><td><strong>code / log<\u002Fstrong><\u002Ftd><td>ライトでも濃紺サーフェス（コード規約）。行番号・最小限のシンタックス色。log は INFO/OK/WARN/ERROR を色分けし、WARN/ERROR 行に地色。<\u002Ftd><\u002Ftr>\n            <tr><td><strong>diagram fallback<\u002Fstrong><\u002Ftd><td>破線枠 +「DIAGRAM FALLBACK」バッジで失敗を明示し、box/arrow の簡易フロー＋原本定義を併記。SVG を描き起こさない。<\u002Ftd><\u002Ftr>\n            <tr><td><strong>generated image<\u002Fstrong><\u002Ftd><td>斜めストライプのプレースホルダ + 寸法表記。差し替え前提を mono ラベルで明示。外部ホスティング不使用。<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n\n        <h2>レイアウト / レスポンシブ<\u002Fh2>\n        <table class=\"spec-table\">\n          <thead><tr><th>幅<\u002Fth><th>レイアウト<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td class=\"mono\">≥1180px<\u002Ftd><td>3 カラム grid: <code class=\"mono\">232px / 1fr / 332px<\u002Fcode>（目次・用紙・コメント）。本文の可読幅は 72ch、表は用紙幅いっぱいに breakout。<\u002Ftd><\u002Ftr>\n            <tr><td class=\"mono\">901–1180px<\u002Ftd><td>目次を隠し 2 カラム（用紙 + コメント）。<\u002Ftd><\u002Ftr>\n            <tr><td class=\"mono\">≤900px<\u002Ftd><td>1 カラム。マージンコメント廃止 → 該当ブロック直下のインライン折りたたみスレッドへ。表は横スクロール継続。<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n\n        <h2>実装メモ（CSS）<\u002Fh2>\n        <div class=\"spec-note\">\n<span class=\"c\">/* テーマ・密度はルート属性で切替。トークンのみ差し替える */<\u002Fspan><br>\n&lt;html <span class=\"p\">data-theme<\u002Fspan>=<span class=\"v\">\"light|dark\"<\u002Fspan> <span class=\"p\">data-density<\u002Fspan>=<span class=\"v\">\"comfortable|compact\"<\u002Fspan>&gt;<br><br>\n<span class=\"c\">/* 比較表: 軸列と見出し行を固定 */<\u002Fspan><br>\ntable.cmp th.axis, td.axis { <span class=\"p\">position<\u002Fspan>: <span class=\"v\">sticky<\u002Fspan>; <span class=\"p\">left<\u002Fspan>: <span class=\"v\">0<\u002Fspan>; }<br>\ntable.cmp thead th { <span class=\"p\">position<\u002Fspan>: <span class=\"v\">sticky<\u002Fspan>; <span class=\"p\">top<\u002Fspan>: <span class=\"v\">0<\u002Fspan>; }<br><br>\n<span class=\"c\">/* マージンコメントは JS で anchor の offsetTop に整列、<\u002Fspan><br>\n<span class=\"c\">   衝突時は下方向にスタック（Docs 方式）。レール幅 332px。 */<\u002Fspan><br>\n<span class=\"c\">/* レビュー状態は data 属性で表現 */<\u002Fspan><br>\n.cx[<span class=\"p\">data-state<\u002Fspan>=<span class=\"v\">\"open|reply|resolved\"<\u002Fspan>]<br>\n.cmt[<span class=\"p\">data-cstate<\u002Fspan>=<span class=\"v\">\"open|reply|resolved\"<\u002Fspan>]<br><br>\n<span class=\"c\">/* 状態の視覚ルール */<\u002Fspan><br>\nopen&nbsp;&nbsp;&nbsp;&nbsp;→ 塗り + 2px 下線、card opacity 1.0<br>\nreply&nbsp;&nbsp;&nbsp;→ 塗り + 2px 下線（別色相）、スレッド表示<br>\nresolved → 破線下線のみ、card opacity .78、フィルタ対象\n        <\u002Fdiv>\n        <p class=\"s-var\" style=\"margin-top:14px;\">キーボード: 目次リンクと <span class=\"kbd\">Tab<\u002Fspan> 移動で各ブロックへ。コメントカード・ハイライトは相互に <code class=\"mono\">.is-active<\u002Fcode> でリンクし、クリックで対象へスクロールする。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n\n  <!-- floating exit bar for published preview -->\n  <div class=\"pub-exit\" id=\"pubExit\" role=\"status\">\n    <span class=\"pe-label\"><b>一般公開プレビュー<\u002Fb> ・ そのままホストできる文書を書き出せます<\u002Fspan>\n    <div class=\"pe-seg\" role=\"group\" aria-label=\"幅\">\n      <button class=\"pe-w on\" data-pw=\"standard\">標準<\u002Fbutton>\n      <button class=\"pe-w\" data-pw=\"max\">最大化<\u002Fbutton>\n    <\u002Fdiv>\n    <button class=\"pe-btn primary\" id=\"pubDownloadBtn\">\n      <svg class=\"icon\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 2v8m0 0 3-3M8 10 5 7M2.5 11v1.5A1.5 1.5 0 0 0 4 14h8a1.5 1.5 0 0 0 1.5-1.5V11\"><\u002Fpath><\u002Fsvg>\n      公開用HTMLを書き出し\n    <\u002Fbutton>\n    <button class=\"pe-btn\" id=\"pubExitBtn\">\n      <svg class=\"icon\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 4l8 8M12 4l-8 8\"><\u002Fpath><\u002Fsvg>\n      編集に戻る\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"d3cbabf7-0f92-4e95-b40e-d6d7b216914c\"><\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
