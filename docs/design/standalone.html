  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"ja\" data-theme=\"light\" data-density=\"compact\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Reviewable HTML Workbench — 設計案<\u002Ftitle>\n<style>/* ============================================================\n   Reviewable HTML Workbench — design tokens & stylesheet\n   System fonts only · no CDN · light/dark · compact/comfortable\n   ============================================================ */\n\n/* ---------- 1. TOKENS ------------------------------------- */\n:root {\n  /* Type families (system only) */\n  --font-sans: -apple-system, BlinkMacSystemFont, \"Segoe UI\", \"Helvetica Neue\",\n    \"Hiragino Kaku Gothic ProN\", \"Yu Gothic\", \"Yu Gothic UI\", Meiryo, sans-serif;\n  --font-serif: -apple-system, BlinkMacSystemFont, \"Segoe UI\", \"Helvetica Neue\",\n    \"Hiragino Kaku Gothic ProN\", \"Yu Gothic\", \"Yu Gothic UI\", Meiryo, sans-serif;\n  --font-mono: ui-monospace, \"SF Mono\", \"Cascadia Mono\", Menlo, Consolas,\n    \"Liberation Mono\", monospace;\n\n  /* Type scale (px) */\n  --fs-caption: 12px;\n  --fs-small:   13px;\n  --fs-meta:    13px;\n  --fs-body:    15px;\n  --fs-lead:    17px;\n  --fs-h3:      16px;\n  --fs-h2:      21px;\n  --fs-h1:      30px;\n  --fs-display: 34px;\n\n  /* Spacing scale */\n  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;\n  --sp-5: 24px; --sp-6: 32px; --sp-7: 48px; --sp-8: 64px;\n\n  /* Radius — restrained */\n  --r-xs: 2px; --r-sm: 4px; --r-md: 6px; --r-lg: 8px; --r-pill: 999px;\n\n  /* Density-driven (overridden by [data-density]) */\n  --line: 1.72;\n  --block-gap: 22px;\n  --pad-card: 18px;\n  --row-pad: 11px 14px;\n\n  /* ---- Light palette (warm neutral) ---- */\n  --bg-app:      #efece5;\n  --bg-rail:     #f4f2ec;\n  --paper:       #fdfcf9;\n  --paper-2:     #f7f5f0;\n  --ink:         #232019;\n  --ink-2:       #5f5b51;\n  --ink-3:       #8d887d;\n  --ink-faint:   #b3aea3;\n  --line-1:      #e6e2d8;\n  --line-2:      #d6d1c5;\n  --line-3:      #c4bdae;\n\n  /* Structural accent (links, primary) */\n  --brand:       #2f6093;\n  --brand-soft:  #e8eff7;\n\n  /* Review-state hues (distinct, shared L/C) */\n  --open:        #2f6fb0;  --open-bg:    #e9f1f9;  --open-line:  #bcd6ee;\n  --reply:       #a9772a;  --reply-bg:   #f7efdc;  --reply-line: #e6cf9b;\n  --resolved:    #3f8a5c;  --resolved-bg:#e9f1ea;  --resolved-line:#bcd9c5;\n\n  /* Code surface (dark even in light mode) */\n  --code-bg:     #1d2127;\n  --code-bg-2:   #23282f;\n  --code-ink:    #d7d3c8;\n  --code-ink-2:  #8b9099;\n  --code-line:   #2f343c;\n  --code-blue:   #82b4e6;\n  --code-green:  #8fce9b;\n  --code-amber:  #e6c074;\n  --code-pink:   #e08fa8;\n\n  /* Elevation */\n  --sh-1: 0 1px 2px rgba(40,36,28,.06), 0 0 0 1px rgba(40,36,28,.04);\n  --sh-2: 0 2px 6px rgba(40,36,28,.08), 0 1px 2px rgba(40,36,28,.05);\n  --sh-3: 0 8px 24px rgba(30,26,20,.16), 0 2px 6px rgba(30,26,20,.10);\n  --focus-ring: 0 0 0 3px color-mix(in srgb, var(--brand) 28%, transparent);\n}\n\n[data-density=\"compact\"] {\n  --line: 1.55;\n  --block-gap: 15px;\n  --pad-card: 13px;\n  --row-pad: 7px 12px;\n  --fs-body: 14px;\n}\n\n[data-theme=\"dark\"] {\n  --bg-app:      #131519;\n  --bg-rail:     #171a1f;\n  --paper:       #1c1f24;\n  --paper-2:     #20242a;\n  --ink:         #e7e3da;\n  --ink-2:       #a6a299;\n  --ink-3:       #7d7a72;\n  --ink-faint:   #5b5851;\n  --line-1:      #2c2f35;\n  --line-2:      #393d44;\n  --line-3:      #4a4e56;\n\n  --brand:       #6ea4dc;\n  --brand-soft:  #1f2d3c;\n\n  --open:        #6ea4dc; --open-bg:    #1c2c3b; --open-line:  #355472;\n  --reply:       #d6a85a; --reply-bg:   #352c18; --reply-line: #604c25;\n  --resolved:    #6dba88; --resolved-bg:#1c2e23; --resolved-line:#345240;\n\n  --code-bg:     #15181d;\n  --code-bg-2:   #1b1f25;\n  --code-line:   #262b32;\n\n  --sh-1: 0 1px 2px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.04);\n  --sh-2: 0 2px 8px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.05);\n  --sh-3: 0 10px 30px rgba(0,0,0,.6), 0 2px 6px rgba(0,0,0,.4);\n  --focus-ring: 0 0 0 3px color-mix(in srgb, var(--brand) 40%, transparent);\n}\n\n/* ---------- 2. RESET / BASE ------------------------------- */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--line);\n  color: var(--ink);\n  background: var(--bg-app);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--r-sm); }\n::selection { background: color-mix(in srgb, var(--brand) 24%, transparent); }\n\n/* ---------- 3. APP CHROME --------------------------------- */\n.app { min-height: 100vh; display: flex; flex-direction: column; }\n\n.topbar {\n  position: sticky; top: 0; z-index: 60;\n  display: flex; align-items: center; gap: var(--sp-4);\n  height: 52px; padding: 0 var(--sp-5);\n  background: color-mix(in srgb, var(--bg-app) 86%, transparent);\n  backdrop-filter: saturate(1.2) blur(8px);\n  border-bottom: 1px solid var(--line-2);\n}\n.brand-mark {\n  display: flex; align-items: center; gap: var(--sp-3); min-width: 0;\n}\n.brand-glyph {\n  width: 26px; height: 26px; flex: none; border-radius: var(--r-sm);\n  background: var(--ink); color: var(--paper);\n  display: grid; place-items: center; font-weight: 700; font-size: 13px;\n  font-family: var(--font-mono); letter-spacing: -.5px;\n}\n.brand-name { font-weight: 650; font-size: 14px; letter-spacing: .1px; white-space: nowrap; }\n.brand-sub { color: var(--ink-3); font-size: var(--fs-caption); white-space: nowrap; }\n\n.topbar-tabs { display: flex; gap: 2px; margin-left: var(--sp-4); }\n.tab {\n  appearance: none; border: 0; background: transparent; cursor: pointer;\n  font: inherit; font-size: var(--fs-small); font-weight: 550; color: var(--ink-2);\n  padding: 6px 12px; border-radius: var(--r-sm); line-height: 1;\n}\n.tab:hover { background: color-mix(in srgb, var(--ink) 6%, transparent); color: var(--ink); }\n.tab[aria-selected=\"true\"] { background: var(--paper); color: var(--ink); box-shadow: var(--sh-1); }\n\n.topbar-spacer { flex: 1; }\n.toolset { display: flex; align-items: center; gap: var(--sp-2); }\n.seg {\n  display: inline-flex; background: var(--paper-2);\n  border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 2px;\n}\n.seg button {\n  appearance: none; border: 0; background: transparent; cursor: pointer; font: inherit;\n  font-size: var(--fs-caption); font-weight: 550; color: var(--ink-2);\n  padding: 5px 9px; border-radius: var(--r-sm); line-height: 1; display: flex; align-items: center; gap: 5px;\n}\n.seg button[aria-pressed=\"true\"], .seg button.on { background: var(--paper); color: var(--ink); box-shadow: var(--sh-1); }\n.seg button:hover:not(.on):not([aria-pressed=\"true\"]) { color: var(--ink); }\n.icon { width: 14px; height: 14px; display: inline-block; vertical-align: -2px; }\n.tool-label { font-size: var(--fs-caption); color: var(--ink-3); margin: 0 2px 0 6px; }\n\n/* select styled as chip */\n.chip-select {\n  appearance: none; font: inherit; font-size: var(--fs-caption); font-weight: 550;\n  color: var(--ink); background: var(--paper-2); border: 1px solid var(--line-2);\n  border-radius: var(--r-md); padding: 6px 26px 6px 10px; cursor: pointer;\n  background-image: linear-gradient(45deg, transparent 50%, var(--ink-3) 50%),\n                    linear-gradient(135deg, var(--ink-3) 50%, transparent 50%);\n  background-position: calc(100% - 14px) 13px, calc(100% - 9px) 13px;\n  background-size: 5px 5px, 5px 5px; background-repeat: no-repeat;\n}\n\n/* ---------- 4. CANVAS / VIEWPORT -------------------------- */\n.canvas { flex: 1; overflow-y: auto; }\n.view { display: none; }\n.view.active { display: block; }\n\n/* Desktop reading layout */\n.doc-shell { max-width: 1320px; margin: 0 auto; padding: var(--sp-7) var(--sp-6) var(--sp-8); }\n.doc-grid {\n  display: grid;\n  grid-template-columns: 232px minmax(0, 1fr) 332px;\n  column-gap: var(--sp-6);\n  align-items: start;\n}\n\n/* TOC rail */\n.toc { position: sticky; top: 76px; font-size: var(--fs-small); }\n.toc-h { font-size: var(--fs-caption); letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 var(--sp-3); font-weight: 650; }\n.toc ol { list-style: none; margin: 0; padding: 0; border-left: 2px solid var(--line-2); }\n.toc li a {\n  display: flex; justify-content: space-between; gap: 8px; align-items: baseline;\n  text-decoration: none; color: var(--ink-2); padding: 5px 12px;\n  margin-left: -2px; border-left: 2px solid transparent;\n}\n.toc li a:hover { color: var(--ink); }\n.toc li a.current { color: var(--ink); border-left-color: var(--brand); font-weight: 600; }\n.toc .toc-sub { list-style: none; margin: 0; padding: 0; }\n.toc .toc-sub li a { padding: 3px 12px 3px 24px; font-size: 12px; color: var(--ink-3); border-left: 2px solid transparent; }\n.toc .toc-flag { font-size: 10px; font-family: var(--font-mono); color: var(--ink-faint); }\n.toc-meta { margin-top: var(--sp-5); padding-top: var(--sp-4); border-top: 1px solid var(--line-1); color: var(--ink-3); font-size: var(--fs-caption); line-height: 1.6; }\n\n/* Main column = the paper */\n.doc-main { min-width: 0; }\n.paper {\n  background: var(--paper); border: 1px solid var(--line-2); border-radius: var(--r-lg);\n  box-shadow: var(--sh-1); padding: var(--sp-7) var(--sp-7) var(--sp-8);\n}\n\n/* comments rail */\n.cmt-rail { position: relative; min-width: 0; }\n.cmt-rail-h {\n  display: flex; align-items: center; justify-content: space-between;\n  font-size: var(--fs-caption); letter-spacing: .12em; text-transform: uppercase;\n  color: var(--ink-3); font-weight: 650; margin-bottom: var(--sp-2);\n}\n.cmt-rail-count { font-family: var(--font-mono); letter-spacing: 0; }\n.cmt-layer { position: relative; }\n\n/* ---------- 5. DOCUMENT HEADER ---------------------------- */\n.doc-breadcrumb { display: flex; align-items: center; gap: 7px; font-size: var(--fs-small); color: var(--ink-3); margin-bottom: var(--sp-4); flex-wrap: wrap; }\n.doc-breadcrumb a { color: var(--ink-3); text-decoration: none; }\n.doc-breadcrumb a:hover { color: var(--ink-2); text-decoration: underline; }\n.doc-breadcrumb .sep { color: var(--ink-faint); }\n\n.doc-headrow { display: flex; align-items: flex-start; gap: var(--sp-4); flex-wrap: wrap; }\n.doc-status {\n  display: inline-flex; align-items: center; gap: 6px; flex: none;\n  font-size: var(--fs-caption); font-weight: 600; padding: 4px 10px;\n  border-radius: var(--r-pill); border: 1px solid var(--line-2);\n  background: var(--paper-2); color: var(--ink-2);\n}\n.doc-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--reply); }\n.doc-status.in-review .dot { background: var(--open); }\n\n.eyebrow { font-size: var(--fs-caption); font-weight: 650; letter-spacing: .14em; text-transform: uppercase; color: var(--brand); margin-bottom: 10px; }\nh1.doc-title { font-family: var(--font-serif); font-weight: 700; font-size: var(--fs-h1); line-height: 1.18; letter-spacing: -.02em; margin: 0 0 var(--sp-3); color: var(--ink); text-wrap: balance; }\n.doc-deck { font-size: var(--fs-lead); line-height: 1.55; color: var(--ink-2); margin: 0; max-width: 60ch; text-wrap: pretty; overflow-wrap: anywhere; }\n\n/* author/agent line */\n.byline { display: flex; align-items: center; gap: var(--sp-3); margin-top: var(--sp-4); font-size: var(--fs-small); color: var(--ink-2); flex-wrap: wrap; }\n.agent-badge { display: inline-flex; align-items: center; gap: 7px; background: var(--paper-2); border: 1px solid var(--line-2); border-radius: var(--r-pill); padding: 3px 11px 3px 4px; font-weight: 550; }\n.agent-avatar { width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(140deg, var(--brand), #6a4f9c); color: #fff; display: grid; place-items: center; font-size: 10px; font-weight: 700; font-family: var(--font-mono); }\n.byline .muted { color: var(--ink-3); }\n\n/* ---------- 6. METADATA GRID ------------------------------ */\n.meta-grid {\n  display: grid; grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));\n  border: 1px solid var(--line-1); border-radius: var(--r-md); overflow: hidden;\n  background: var(--paper-2); margin: var(--sp-5) 0;\n}\n.meta-cell { padding: 12px 14px; border-right: 1px solid var(--line-1); border-bottom: 1px solid var(--line-1); }\n.meta-key { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }\n.meta-val { font-size: var(--fs-small); font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }\n.meta-val .mono { font-family: var(--font-mono); font-weight: 500; font-size: 12px; }\n.confidence { display: inline-flex; gap: 3px; align-items: center; }\n.confidence .bar { width: 5px; height: 11px; border-radius: 1px; background: var(--line-3); }\n.confidence .bar.fill { background: var(--resolved); }\n\n/* ---------- 7. DOCUMENT BODY ------------------------------ */\n.prose { color: var(--ink); }\n.prose > * + * { margin-top: var(--block-gap); }\n.prose h2 {\n  font-family: var(--font-serif); font-weight: 700; font-size: var(--fs-h2);\n  line-height: 1.25; margin: var(--sp-7) 0 0; letter-spacing: -.015em;\n  padding-bottom: 10px; border-bottom: 1px solid var(--line-1); scroll-margin-top: 72px;\n}\n.prose h2 .sec-no { font-family: var(--font-mono); font-size: 14px; color: var(--ink-faint); font-weight: 500; margin-right: 10px; }\n.prose h3 { font-size: var(--fs-h3); font-weight: 650; margin: var(--sp-5) 0 0; letter-spacing: .01em; }\n.prose h4 { font-size: var(--fs-body); font-weight: 650; margin: var(--sp-4) 0 0; color: var(--ink-2); letter-spacing: .01em; }\n\n/* ---------- auto chapter numbering (1 / 1.2 / 2.1.1) ----- */\n.prose.autonum { counter-reset: h2 h3 h4; }\n.prose.autonum h2 { counter-increment: h2; counter-reset: h3 0 h4 0; }\n.prose.autonum h3 { counter-increment: h3; counter-reset: h4 0; }\n.prose.autonum h4 { counter-increment: h4; }\n.prose.autonum h2 .sec-no { display: none; }\n.prose.autonum h2::before {\n  content: counter(h2) \".\";\n  font-family: var(--font-mono); font-size: 15px; font-weight: 500; color: var(--ink-faint);\n  margin-right: 12px; letter-spacing: 0;\n}\n.prose.autonum h3::before {\n  content: counter(h2) \".\" counter(h3);\n  font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--brand);\n  margin-right: 9px; letter-spacing: 0;\n}\n.prose.autonum h4::before {\n  content: counter(h2) \".\" counter(h3) \".\" counter(h4);\n  font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--ink-3);\n  margin-right: 8px; letter-spacing: 0;\n}\n.prose p { margin: 0; max-width: 72ch; text-wrap: pretty; overflow-wrap: anywhere; }\n.prose a.ref { color: var(--brand); text-decoration: none; font-weight: 550; }\n.prose a.ref:hover { text-decoration: underline; }\n.prose sup.cite { font-size: 10px; color: var(--brand); font-weight: 700; font-family: var(--font-mono); vertical-align: super; margin-left: 1px; }\n.prose ul, .prose ol { margin: 0; padding-left: 22px; max-width: 72ch; text-wrap: pretty; }\n.prose li + li { margin-top: 6px; }\n.prose strong { font-weight: 650; }\n.prose code:not(pre code) {\n  font-family: var(--font-mono); font-size: .86em; background: var(--paper-2);\n  border: 1px solid var(--line-1); border-radius: var(--r-xs); padding: 1px 5px;\n  color: color-mix(in srgb, var(--ink) 88%, var(--brand));\n}\n.lead-note { font-size: var(--fs-lead); line-height: 1.55; color: var(--ink-2); }\n\n/* ---------- 8. SUMMARY / TL;DR ---------------------------- */\n.summary {\n  border: 1px solid var(--line-2); border-radius: var(--r-md);\n  background: linear-gradient(var(--paper-2), var(--paper-2)) padding-box;\n  padding: var(--pad-card) var(--sp-5); margin: var(--sp-5) 0;\n  border-left: 3px solid var(--brand);\n}\n.summary-h { display: flex; align-items: center; gap: 8px; font-size: var(--fs-caption); letter-spacing: .12em; text-transform: uppercase; color: var(--brand); font-weight: 700; margin-bottom: 10px; }\n.summary p { margin: 0; text-align: justify; text-justify: inter-character; word-break: auto-phrase; }\n.summary ul { margin: 8px 0 0; padding-left: 20px; }\n\n/* ---------- 9. CALLOUTS ----------------------------------- */\n.callout {\n  display: grid; grid-template-columns: 26px 1fr; gap: 12px; align-items: start;\n  border: 1px solid var(--line-2); border-left-width: 3px; border-radius: var(--r-md);\n  padding: 14px var(--sp-4); background: var(--paper-2);\n}\n.callout .co-ico { width: 22px; height: 22px; border-radius: var(--r-sm); display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 13px; margin-top: 1px; }\n.callout .co-title { font-weight: 650; font-size: var(--fs-small); margin-bottom: 3px; }\n.callout .co-body { font-size: var(--fs-small); color: var(--ink-2); line-height: 1.6; }\n.callout .co-body p { margin: 0; }\n.callout.info     { border-left-color: var(--open);     background: var(--open-bg); }\n.callout.info .co-ico { background: var(--open); }\n.callout.warn     { border-left-color: var(--reply);    background: var(--reply-bg); }\n.callout.warn .co-ico { background: var(--reply); }\n.callout.success  { border-left-color: var(--resolved); background: var(--resolved-bg); }\n.callout.success .co-ico { background: var(--resolved); }\n[data-theme=\"dark\"] .callout.info .co-title,\n[data-theme=\"dark\"] .callout.warn .co-title,\n[data-theme=\"dark\"] .callout.success .co-title { color: var(--ink); }\n\n/* recommendation block */\n.reco { border:1px solid var(--resolved-line); background: var(--resolved-bg); border-radius: var(--r-md); padding: var(--sp-4) var(--sp-5); }\n.reco .reco-tag { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color: var(--resolved); margin-bottom: 8px; }\n\n/* ---------- 10. COMPARISON TABLE -------------------------- */\n.table-wrap {\n  border: 1px solid var(--line-2); border-radius: var(--r-md); overflow: hidden;\n  background: var(--paper);\n}\n.table-cap {\n  display: flex; align-items: baseline; justify-content: space-between; gap: 12px;\n  padding: 10px 14px; border-bottom: 1px solid var(--line-1); background: var(--paper-2);\n  font-size: var(--fs-caption); color: var(--ink-3); flex-wrap: wrap;\n}\n.table-cap .t-no { font-family: var(--font-mono); font-weight: 600; color: var(--ink-2); }\n.table-cap .t-title { color: var(--ink); font-weight: 600; font-size: var(--fs-small); }\n.table-scroll { overflow-x: auto; }\ntable.cmp { border-collapse: separate; border-spacing: 0; width: 100%; font-size: var(--fs-small); min-width: 720px; }\ntable.cmp th, table.cmp td { padding: var(--row-pad); text-align: left; vertical-align: top; border-bottom: 1px solid var(--line-1); }\ntable.cmp thead th {\n  position: sticky; top: 0; z-index: 2; background: var(--paper-2);\n  font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-2);\n  font-weight: 650; border-bottom: 2px solid var(--line-2); white-space: nowrap;\n}\n/* sticky first column = comparison axis */\ntable.cmp th.axis, table.cmp td.axis {\n  position: sticky; left: 0; z-index: 1; background: var(--paper);\n  font-weight: 600; color: var(--ink); border-right: 1px solid var(--line-2);\n  min-width: 168px; box-shadow: 1px 0 0 var(--line-1);\n}\ntable.cmp thead th.axis { z-index: 3; background: var(--paper-2); }\ntable.cmp tbody tr:hover td { background: color-mix(in srgb, var(--brand) 4%, transparent); }\ntable.cmp tbody tr:hover td.axis { background: color-mix(in srgb, var(--brand) 6%, var(--paper)); }\ntable.cmp tbody tr:last-child td { border-bottom: 0; }\n/* recommended column highlight */\ntable.cmp col.pick, table.cmp .pick { background: color-mix(in srgb, var(--resolved) 8%, var(--paper)); }\ntable.cmp th.pick { background: color-mix(in srgb, var(--resolved) 14%, var(--paper-2)); color: var(--resolved); }\ntable.cmp td.pick { background: color-mix(in srgb, var(--resolved) 7%, var(--paper)); }\n.axis-sub { display: block; font-weight: 400; color: var(--ink-3); font-size: 11px; margin-top: 2px; }\n/* rating pills */\n.rate { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; }\n.rate .pips { display: inline-flex; gap: 2px; }\n.rate .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--line-3); }\n.rate.r5 .pip:nth-child(-n+5),.rate.r4 .pip:nth-child(-n+4),.rate.r3 .pip:nth-child(-n+3),.rate.r2 .pip:nth-child(-n+2),.rate.r1 .pip:nth-child(-n+1){ background: var(--rate-c); }\n.rate.good { --rate-c: var(--resolved); }\n.rate.mid  { --rate-c: var(--reply); }\n.rate.low  { --rate-c: #b65b4a; }\n.tag-yes { color: var(--resolved); font-weight: 600; }\n.tag-no  { color: var(--ink-3); }\n.tag-cell-note { display:block; color: var(--ink-3); font-size: 11px; margin-top: 3px; }\n.num { font-variant-numeric: tabular-nums; font-family: var(--font-mono); font-size: 12px; }\n\n/* ---------- 11. CODE / LOG BLOCK -------------------------- */\n.code {\n  background: var(--code-bg); border: 1px solid var(--code-line); border-radius: var(--r-md);\n  overflow: hidden; font-family: var(--font-mono); color: var(--code-ink);\n}\n.code-bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--code-bg-2); border-bottom: 1px solid var(--code-line); font-size: var(--fs-caption); }\n.code-bar .dots { display: flex; gap: 5px; }\n.code-bar .dots i { width: 9px; height: 9px; border-radius: 50%; background: #4a4f57; display:block; }\n.code-bar .fname { color: var(--code-ink-2); font-size: 12px; }\n.code-bar .lang { margin-left: auto; color: var(--code-ink-2); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }\n.code-body { margin: 0; padding: 14px 0; font-size: 12.5px; line-height: 1.65; overflow-x: auto; }\n.code-body .ln { display: block; padding: 0 16px 0 56px; position: relative; white-space: pre; }\n.code-body .ln::before { content: attr(data-n); position: absolute; left: 0; width: 40px; text-align: right; color: #565c64; }\n.code-body .ln.hl { background: rgba(130,180,230,.10); box-shadow: inset 2px 0 0 var(--code-blue); }\n.tok-k { color: var(--code-pink); }\n.tok-f { color: var(--code-blue); }\n.tok-s { color: var(--code-green); }\n.tok-c { color: var(--code-ink-2); font-style: italic; }\n.tok-n { color: var(--code-amber); }\n/* log variant */\n.code.log .code-body { font-size: 12px; }\n.log-line { display: block; padding: 1px 16px; white-space: pre-wrap; word-break: break-word; }\n.log-line .ts { color: #5f656d; }\n.lvl { font-weight: 700; }\n.lvl.info { color: var(--code-blue); }\n.lvl.ok   { color: var(--code-green); }\n.lvl.warn { color: var(--code-amber); }\n.lvl.err  { color: var(--code-pink); }\n.log-line.is-warn { background: rgba(230,192,116,.07); }\n.log-line.is-err  { background: rgba(224,143,168,.09); }\n\n/* ---------- 12. DIAGRAM FALLBACK -------------------------- */\n.diagram-fallback {\n  border: 1px dashed var(--line-3); border-radius: var(--r-md); background: var(--paper-2);\n  padding: var(--sp-5); position: relative;\n}\n.diagram-fallback .df-head { display: flex; align-items: center; gap: 8px; font-size: var(--fs-caption); color: var(--ink-3); font-family: var(--font-mono); margin-bottom: var(--sp-4); }\n.diagram-fallback .df-badge { background: var(--reply-bg); color: var(--reply); border: 1px solid var(--reply-line); border-radius: var(--r-xs); padding: 1px 6px; font-weight: 600; letter-spacing: .04em; }\n/* ascii/box render of the diagram */\n.flow { display: flex; align-items: stretch; gap: 0; flex-wrap: wrap; font-size: var(--fs-small); }\n.node { background: var(--paper); border: 1px solid var(--line-2); border-radius: var(--r-sm); padding: 10px 14px; text-align: center; min-width: 96px; box-shadow: var(--sh-1); }\n.node .n-t { font-weight: 600; }\n.node .n-s { color: var(--ink-3); font-size: 11px; font-family: var(--font-mono); }\n.node.accent { border-color: var(--brand); background: var(--brand-soft); }\n.arrow { align-self: center; color: var(--ink-faint); font-family: var(--font-mono); padding: 0 10px; font-size: 16px; }\n.df-cap { margin-top: var(--sp-4); font-size: var(--fs-caption); color: var(--ink-3); }\n.df-raw { margin-top: 12px; font-size: 11px; color: var(--ink-faint); font-family: var(--font-mono); }\n\n/* ---------- 13. GENERATED IMAGE --------------------------- */\n.figure { margin: var(--sp-5) 0; }\n.gen-image {\n  position: relative; border: 1px solid var(--line-2); border-radius: var(--r-md);\n  aspect-ratio: 16 / 8.5; overflow: hidden;\n  background-color: var(--paper-2);\n  background-image: repeating-linear-gradient(135deg,\n    transparent 0, transparent 9px,\n    color-mix(in srgb, var(--ink) 5%, transparent) 9px,\n    color-mix(in srgb, var(--ink) 5%, transparent) 10px);\n  display: grid; place-items: center;\n}\n.gen-image .gi-tag {\n  position: absolute; top: 10px; left: 10px; font-family: var(--font-mono); font-size: 11px;\n  background: color-mix(in srgb, var(--paper) 88%, transparent); color: var(--ink-2);\n  border: 1px solid var(--line-2); border-radius: var(--r-xs); padding: 2px 7px;\n}\n.gen-image .gi-center { text-align: center; color: var(--ink-3); font-family: var(--font-mono); font-size: var(--fs-small); padding: 10px 16px; }\n.gen-image .gi-center .gi-dim { display:block; font-size: 11px; color: var(--ink-faint); margin-top: 4px; }\nfigcaption { margin-top: 8px; font-size: var(--fs-caption); color: var(--ink-3); display: flex; gap: 8px; }\nfigcaption .fc-no { font-family: var(--font-mono); font-weight: 600; color: var(--ink-2); }\n\n/* ---------- 14. REVIEW HIGHLIGHTS ------------------------- */\n.cx {\n  border-radius: var(--r-xs); padding: 0 1px; cursor: pointer;\n  transition: background .12s; position: relative;\n  box-decoration-break: clone; -webkit-box-decoration-break: clone;\n}\n.cx[data-state=\"open\"]     { background: var(--open-bg);     border-bottom: 2px solid var(--open); }\n.cx[data-state=\"reply\"]    { background: var(--reply-bg);    border-bottom: 2px solid var(--reply); }\n.cx[data-state=\"resolved\"] { background: transparent;        border-bottom: 1px dashed var(--resolved-line); color: inherit; }\n.cx:hover { filter: brightness(.97); }\n[data-theme=\"dark\"] .cx:hover { filter: brightness(1.25); }\n.cx.is-active { box-shadow: 0 0 0 2px var(--paper), 0 0 0 4px currentColor; }\n.cx[data-state=\"open\"].is-active    { color: var(--open); }\n.cx[data-state=\"reply\"].is-active   { color: var(--reply); }\n.cx[data-state=\"resolved\"].is-active{ color: var(--resolved); }\n.cx .cx-num {\n  font-family: var(--font-mono); font-size: 9px; font-weight: 700; line-height: 1;\n  vertical-align: super; padding: 1px 3px; border-radius: var(--r-pill); margin-left: 2px;\n  color: #fff;\n}\n.cx[data-state=\"open\"] .cx-num     { background: var(--open); }\n.cx[data-state=\"reply\"] .cx-num    { background: var(--reply); }\n.cx[data-state=\"resolved\"] .cx-num { background: var(--resolved); }\n\n/* hide resolved highlights/threads when filtered */\n.filter-open [data-state=\"reply\"].cx { background: var(--reply-bg); }\n.hide-resolved [data-cstate=\"resolved\"] { display: none !important; }\n.only-open [data-cstate=\"reply\"], .only-open [data-cstate=\"resolved\"] { display: none !important; }\n.only-open .cx[data-state=\"reply\"], .only-open .cx[data-state=\"resolved\"] { background: transparent; border-bottom: 0; }\n.hide-resolved .cx[data-state=\"resolved\"] { background: transparent; border-bottom: 0; cursor: default; }\n\n/* ---------- 14b. FOCUS / WIDE READING MODE --------------- */\n.is-focus .doc-grid { grid-template-columns: minmax(0, 1fr); }\n.is-focus .toc, .is-focus .cmt-rail { display: none; }\n.is-focus .doc-shell { max-width: 1480px; }\n.is-focus .paper { padding: var(--sp-7) clamp(28px, 5vw, 76px) var(--sp-8); }\n.is-focus .prose p, .is-focus .prose ul, .is-focus .prose ol, .is-focus .doc-deck { max-width: none; }\n/* big blocks use the full width gained by hiding the rails */\n.is-focus .table-wrap, .is-focus .code, .is-focus .figure, .is-focus .diagram-fallback, .is-focus .summary, .is-focus .meta-grid { max-width: none; }\n.is-focus .cx { background: transparent; border-bottom: 0; cursor: default; }\n.is-focus .cx .cx-num { display: none; }\n#focusToggle[aria-pressed=\"true\"] { background: var(--brand-soft); color: var(--brand); }\n\n/* ---------- 14c. PUBLISHED / PUBLIC MODE ----------------- */\n/* 一般公開用: review UI と workbench chrome を排し、配布文書の見え方にする */\n.is-published .topbar { display: none; }\n.is-published .doc-grid { grid-template-columns: minmax(0, 1fr); }\n.is-published .toc, .is-published .cmt-rail { display: none; }\n.is-published .doc-shell { max-width: 1180px; padding-top: var(--sp-7); }\n/* keep the normal warm bg + white paper card; only drop review/chrome */\n.is-published .paper { padding: var(--sp-7) clamp(28px, 5vw, 64px) var(--sp-8); }\n.is-published .prose p, .is-published .prose ul, .is-published .prose ol, .is-published .doc-deck { max-width: none; }\n/* maximize within published: widen shell + let big blocks breakout */\n.is-published .canvas.is-focus .doc-shell { max-width: 1480px; }\n.is-published .canvas.is-focus .prose p, .is-published .canvas.is-focus .prose ul,\n.is-published .canvas.is-focus .prose ol, .is-published .canvas.is-focus .doc-deck { max-width: none; }\n.is-published .table-wrap, .is-published .code, .is-published .figure,\n.is-published .diagram-fallback, .is-published .summary, .is-published .meta-grid { max-width: none; }\n/* strip every review affordance */\n.is-published .cx { background: transparent; border-bottom: 0; cursor: default; color: inherit; }\n.is-published .cx .cx-num { display: none; }\n.is-published .doc-status,\n.is-published .byline,\n.is-published .toc-flag { display: none; }\n/* unresolved diagram still shown as fallback, just without the comment hook */\n.is-published .diagram-fallback .cx { font-family: var(--font-mono); }\n\n/* floating bar to exit published preview */\n.pub-exit {\n  position: fixed; z-index: 80; left: 50%; bottom: 20px; transform: translateX(-50%);\n  display: none; align-items: center; gap: 10px; max-width: calc(100vw - 28px);\n  background: var(--ink); color: var(--paper);\n  border-radius: var(--r-pill); padding: 8px 10px 8px 18px;\n  box-shadow: var(--sh-3); font-size: var(--fs-small);\n}\n.is-published .pub-exit { display: flex; }\n.pub-exit > * { flex: none; }\n.pub-exit .pe-label { font-weight: 550; min-width: 0; flex: 0 1 auto; overflow: hidden; }\n@media (max-width: 760px) { .pub-exit .pe-label { display: none; } }\n.pub-exit .pe-w, .pub-exit .pe-btn { white-space: nowrap; }\n.pub-exit .pe-label b { font-weight: 700; }\n.pub-exit .pe-seg { display: inline-flex; background: rgba(255,255,255,.14); border-radius: var(--r-pill); padding: 2px; }\n.pub-exit .pe-seg .pe-w {\n  appearance: none; cursor: pointer; font: inherit; font-size: var(--fs-caption); font-weight: 600;\n  color: rgba(255,255,255,.7); background: transparent; border: 0; border-radius: var(--r-pill);\n  padding: 5px 12px;\n}\n.pub-exit .pe-seg .pe-w.on { background: var(--paper); color: var(--ink); }\n.pub-exit .pe-btn {\n  appearance: none; cursor: pointer; font: inherit; font-size: var(--fs-caption); font-weight: 600;\n  color: var(--ink); background: var(--paper); border: 0; border-radius: var(--r-pill);\n  padding: 6px 12px; display: inline-flex; align-items: center; gap: 6px;\n}\n.pub-exit .pe-btn:hover { filter: brightness(.94); }\n.pub-exit .pe-btn.primary { background: var(--brand); color: #fff; }\n.pub-exit .pe-btn.primary:hover { filter: brightness(1.08); }\n/* tiny confirmation toast after export */\n.pub-toast {\n  position: fixed; z-index: 90; left: 50%; bottom: 76px; transform: translateX(-50%) translateY(8px);\n  background: var(--resolved); color: #fff; font-size: var(--fs-small); font-weight: 600;\n  padding: 9px 16px; border-radius: var(--r-pill); box-shadow: var(--sh-3);\n  display: flex; align-items: center; gap: 8px; opacity: 0; pointer-events: none;\n  transition: opacity .2s, transform .2s;\n}\n.pub-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }\n#publishToggle[aria-pressed=\"true\"] { background: var(--brand-soft); color: var(--brand); }\n\n/* ---------- 15. COMMENT CARDS ----------------------------- */\n.cmt {\n  background: var(--paper); border: 1px solid var(--line-2); border-radius: var(--r-md);\n  box-shadow: var(--sh-1); padding: var(--pad-card); font-size: var(--fs-small);\n  border-left: 3px solid var(--ink-3); transition: box-shadow .15s, border-color .15s, transform .15s;\n}\n/* desktop absolute positioning */\n.doc-grid .cmt { position: absolute; left: 0; right: 0; width: 100%; }\n.cmt[data-cstate=\"open\"]     { border-left-color: var(--open); }\n.cmt[data-cstate=\"reply\"]    { border-left-color: var(--reply); }\n.cmt[data-cstate=\"resolved\"] { border-left-color: var(--resolved); opacity: .78; }\n.cmt.is-active { box-shadow: var(--sh-3); border-color: var(--line-3); transform: translateX(-3px); z-index: 5; opacity: 1; }\n\n.cmt-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }\n.av { width: 26px; height: 26px; border-radius: 50%; flex: none; display: grid; place-items: center; color: #fff; font-size: 11px; font-weight: 700; font-family: var(--font-mono); }\n.av.u1 { background: #4d6a9a; } .av.u2 { background: #8a6a3e; } .av.u3 { background: #5a7d5a; } .av.u4 { background: #84566f; }\n.cmt-who { min-width: 0; }\n.cmt-name { font-weight: 650; font-size: var(--fs-small); line-height: 1.2; }\n.cmt-time { font-size: 11px; color: var(--ink-3); }\n.cmt-state {\n  margin-left: auto; flex: none; font-size: 10px; font-weight: 700; letter-spacing: .04em;\n  padding: 3px 8px; border-radius: var(--r-pill); display: inline-flex; align-items: center; gap: 4px;\n}\n.cmt-state .sdot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }\n.cmt[data-cstate=\"open\"] .cmt-state     { color: var(--open);     background: var(--open-bg); }\n.cmt[data-cstate=\"reply\"] .cmt-state    { color: var(--reply);    background: var(--reply-bg); }\n.cmt[data-cstate=\"resolved\"] .cmt-state { color: var(--resolved); background: var(--resolved-bg); }\n\n.cmt-quote { font-size: 12px; color: var(--ink-3); border-left: 2px solid var(--line-2); padding-left: 8px; margin: 0 0 8px; font-style: italic; }\n.cmt-body { color: var(--ink); line-height: 1.55; }\n.cmt-body p { margin: 0; }\n\n/* threaded replies */\n.cmt-thread { margin-top: 10px; border-top: 1px solid var(--line-1); padding-top: 10px; display: flex; flex-direction: column; gap: 10px; }\n.reply { display: grid; grid-template-columns: 22px 1fr; gap: 8px; align-items: start; }\n.reply .av { width: 22px; height: 22px; font-size: 9px; }\n.reply-name { font-weight: 650; font-size: 12px; }\n.reply-name .role { font-weight: 500; color: var(--ink-3); margin-left: 6px; font-size: 11px; }\n.reply-time { font-size: 10px; color: var(--ink-3); margin-left: 6px; }\n.reply-body { font-size: 12.5px; color: var(--ink-2); line-height: 1.5; margin-top: 2px; }\n.reply.from-agent .av { background: linear-gradient(140deg, var(--brand), #6a4f9c); }\n\n/* resolved banner inside card */\n.cmt-resolved-by { display: flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 11px; color: var(--resolved); font-weight: 600; }\n\n/* card footer / actions */\n.cmt-foot { display: flex; align-items: center; gap: 6px; margin-top: 12px; }\n.cmt-input {\n  flex: 1; font: inherit; font-size: 12.5px; background: var(--paper-2);\n  border: 1px solid var(--line-2); border-radius: var(--r-sm); padding: 7px 10px; color: var(--ink);\n  min-width: 0;\n}\n.cmt-input::placeholder { color: var(--ink-faint); }\n.btn {\n  appearance: none; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;\n  border-radius: var(--r-sm); padding: 7px 12px; border: 1px solid var(--line-2);\n  background: var(--paper-2); color: var(--ink); line-height: 1; white-space: nowrap;\n}\n.btn:hover { border-color: var(--line-3); }\n.btn.primary { background: var(--brand); border-color: var(--brand); color: #fff; }\n.btn.primary:hover { filter: brightness(1.06); }\n.btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); padding: 7px 8px; }\n.btn.ghost:hover { background: color-mix(in srgb, var(--ink) 7%, transparent); }\n.btn.resolve { color: var(--resolved); }\n.btn.reopen { color: var(--reply); }\n.btn .icon { width: 13px; height: 13px; }\n\n/* ---------- 16. MOBILE (phone frame) ---------------------- */\n.mobile-stage { display: grid; place-items: start center; padding: var(--sp-6) var(--sp-4) var(--sp-8); gap: var(--sp-4); }\n.mobile-note { max-width: 380px; text-align: center; color: var(--ink-3); font-size: var(--fs-small); }\n.phone {\n  width: 390px; max-width: 100%; background: #0c0d0f; border-radius: 44px; padding: 10px;\n  box-shadow: var(--sh-3), 0 0 0 1px rgba(0,0,0,.3); position: relative;\n}\n.phone-screen { background: var(--paper); border-radius: 35px; overflow: hidden; height: 760px; display: flex; flex-direction: column; position: relative; }\n.phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 130px; height: 26px; background: #0c0d0f; border-radius: 0 0 16px 16px; z-index: 30; }\n.m-statusbar { display: flex; justify-content: space-between; align-items: center; padding: 9px 22px 4px; font-size: 12px; font-weight: 650; font-family: var(--font-mono); flex: none; }\n.m-statusbar .m-icons { display: flex; gap: 5px; align-items:center; }\n.m-topbar { display: flex; align-items: center; gap: 10px; padding: 6px 16px 10px; border-bottom: 1px solid var(--line-1); flex: none; }\n.m-topbar .m-back { color: var(--ink-2); font-size: 18px; }\n.m-topbar .m-title { font-weight: 650; font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }\n.m-topbar .m-rev { font-size: 11px; font-weight: 600; color: var(--open); background: var(--open-bg); padding: 3px 8px; border-radius: var(--r-pill); }\n.m-scroll { overflow-y: auto; padding: var(--sp-4) var(--sp-4) var(--sp-7); flex: 1; }\n.m-scroll h1.doc-title { font-size: 22px; }\n.m-scroll .prose p, .m-scroll .prose li { max-width: none; }\n.m-scroll .doc-deck { font-size: 15px; }\n.m-scroll .meta-grid { grid-template-columns: repeat(2, 1fr); }\n.m-scroll table.cmp { min-width: 560px; }\n/* inline comment thread (mobile) */\n.m-thread {\n  margin: 12px 0; border: 1px solid var(--line-2); border-left-width: 3px; border-radius: var(--r-md);\n  background: var(--paper-2); overflow: hidden;\n}\n.m-thread[data-cstate=\"open\"]     { border-left-color: var(--open); }\n.m-thread[data-cstate=\"reply\"]    { border-left-color: var(--reply); }\n.m-thread[data-cstate=\"resolved\"] { border-left-color: var(--resolved); }\n.m-thread-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px; cursor: pointer; }\n.m-thread-head .cmt-state { margin-left: auto; }\n.m-thread-head .m-count { font-size: 11px; color: var(--ink-3); font-family: var(--font-mono); }\n.m-thread-body { padding: 0 12px 12px; display: none; }\n.m-thread.open-state .m-thread-body { display: block; }\n.m-chev { transition: transform .15s; color: var(--ink-3); }\n.m-thread.open-state .m-chev { transform: rotate(90deg); }\n.m-fab {\n  position: absolute; right: 14px; bottom: 14px; z-index: 25; background: var(--brand); color:#fff;\n  border-radius: var(--r-pill); padding: 10px 16px; font-size: 12px; font-weight: 650; box-shadow: var(--sh-2);\n  display: inline-flex; align-items: center; gap: 7px;\n}\n.m-fab .badge-n { background: rgba(255,255,255,.25); border-radius: var(--r-pill); padding: 1px 6px; font-family: var(--font-mono); }\n\n/* floating jump-to-comment list on desktop */\n.cmt-empty { color: var(--ink-faint); font-size: var(--fs-small); padding: var(--sp-4); border: 1px dashed var(--line-2); border-radius: var(--r-md); text-align: center; }\n\n/* ---------- 17. RESPONSIVE -------------------------------- */\n@media (max-width: 1180px) {\n  .doc-grid { grid-template-columns: minmax(0,1fr) 320px; }\n  .toc { display: none; }\n}\n@media (max-width: 900px) {\n  .doc-shell { padding: var(--sp-5) var(--sp-4) var(--sp-7); }\n  .doc-grid { grid-template-columns: minmax(0,1fr); }\n  .cmt-rail { display: none; }\n  .paper { padding: var(--sp-5) var(--sp-4) var(--sp-6); }\n  /* on narrow desktop view, surface inline threads that JS injects */\n  .inline-thread-host { display: block; }\n}\n@media (min-width: 901px) { .inline-thread-host { display: none; } }\n\n/* ---------- 18. SPEC TAB ---------------------------------- */\n.spec-shell { max-width: 1080px; margin: 0 auto; padding: var(--sp-7) var(--sp-6) var(--sp-8); }\n.spec-shell h2 { font-family: var(--font-serif); font-size: var(--fs-h2); margin: var(--sp-7) 0 var(--sp-4); padding-bottom: 8px; border-bottom: 1px solid var(--line-2); }\n.spec-shell h2:first-of-type { margin-top: var(--sp-4); }\n.spec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }\n.spec-card { background: var(--paper); border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 14px; box-shadow: var(--sh-1); }\n.swatch { height: 46px; border-radius: var(--r-sm); border: 1px solid var(--line-1); margin-bottom: 8px; }\n.spec-card .s-name { font-weight: 650; font-size: var(--fs-small); }\n.spec-card .s-var { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }\n.spec-card .s-hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); float: right; }\n.type-row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--line-1); }\n.type-row .t-spec { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); width: 150px; flex: none; }\n.space-scale { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }\n.space-scale .s-item { text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }\n.space-scale .s-box { background: var(--brand-soft); border: 1px solid var(--brand); margin-bottom: 4px; }\n.spec-note { background: var(--code-bg); color: var(--code-ink); border-radius: var(--r-md); padding: 16px; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.7; overflow-x: auto; }\n.spec-note .c { color: var(--code-ink-2); }\n.spec-note .p { color: var(--code-pink); }\n.spec-note .v { color: var(--code-green); }\n.spec-lede { font-size: var(--fs-lead); color: var(--ink-2); max-width: 70ch; line-height: 1.55; }\n.spec-state-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 16px; margin-top: 12px; }\n.kbd { font-family: var(--font-mono); font-size: 11px; background: var(--paper-2); border: 1px solid var(--line-2); border-bottom-width: 2px; border-radius: var(--r-sm); padding: 1px 6px; }\n.spec-table { width: 100%; border-collapse: collapse; font-size: var(--fs-small); }\n.spec-table th, .spec-table td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--line-1); vertical-align: top; }\n.spec-table th { color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }\n.spec-table td.mono, .spec-table .mono { font-family: var(--font-mono); font-size: 12px; }\n\n/* utility */\n.mono { font-family: var(--font-mono); }\n.visually-hidden { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"app\">\n\n  <!-- ============ TOP BAR ============ -->\n  <header class=\"topbar\">\n    <div class=\"brand-mark\">\n      <div class=\"brand-glyph\">RW<\u002Fdiv>\n      <div>\n        <div class=\"brand-name\">Reviewable Workbench<\u002Fd toc-sub\">\n                  <li><a href=\"#s2\">2.1 テストデータセット<\u002Fa><\u002Fli>\n                  <li><a href=\"#s2\">2.2 評価軸の重み<\u002Fa><\u002Fli>\n                <\u002Fol>\n              <\u002Fli>\n              <li><a href=\"#s3\">3. 候補の比較<span class=\"toc-flag\">●1<\u002Fspan><\u002Fa><\u002Fli>\n              <li>\n                <a href=\"#s4\">4. コスト試算の前提<\u002Fa>\n                <ol class=\"toc-sub\">\n                  <li><a href=\"#s4\">4.1 ワークロード想定<\u002Fa><\u002Fli>\n                <\u002Fol>\n              <\u002Fli>\n              <li>\n                <a href=\"#s5\">5. 検証ログ<\u002Fa>\n                <ol class=\"toc-sub\">\n                  <li><a href=\"#s5\">5.1 クエリベンチマーク<\u002Fa><\u002Fli>\n                <\u002Fol>\n              <\u002Fli>\n              <li>\n                <a href=\"#s6\">6. アーキテクチャ案<span class=\"toc-flag\">●1<\u002Fspan><\u002Fa>\n                <ol class=\"toc-sub\">\n                  <li><a href=\"#s6\">6.1 併用構成の概要<\u002Fa><\u002Fli>\n                <\u002Fol>\n              <\u002Fli>\n              <li><a href=\"#s7\">7. 推奨と結論<span class=\"toc-flag\">✓1<\u002Fspan><\u002Fa><\u002Fli>\n            <\u002Fol>\n            <div class=\"toc-meta\">\n              <strong>レビュー状況<\u002Fstrong><br>\n              未対応 2 · 返信あり 1 · 解決済み 1<br>\n              担当: 佐藤 / 田中 / 高橋 / 鈴木\n            <\u002Fdiv>\n          <\u002Faside>\n\n          <!-- MAIN PAPER -->\n          <article class=\"doc-main\">\n            <div class=\"paper\">\n\n              <!-- DOCUMENT HEADER -->\n              <div class=\"doc-breadcrumb\">\n                <a href=\"#\">調査タスク<\u002Fa><span class=\"sep\">/<\u002Fspan>\n                <a href=\"#\">データ基盤<\u002Fa><span class=\"sep\">/<\u002Fspan>\n                <span>選定調査 #248<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"doc-headrow\">\n                <div style=\"flex:1; min-width:260px;\">\n                  <p class=\"eyebrow\">技術選定レポート<\u002Fp>\n                  <h1 class=\"doc-title\">次期データ基盤 — ストレージ / クエリエンジン選定調査<\u002Fh1>\n                <\u002Fdiv>\n                <span class=\"doc-status in-review\"><span class=\"dot\"><\u002Fspan>レビュー中<\u002Fspan>\n              <\u002Fdiv>\n              <p class=\"doc-deck\">オンプレ Postgres の分析ワークロード逼迫を受け、列指向 OLAP エンジンへの移行候補を 4 製品で比較。コスト・性能・運用負荷・ロックインの観点から推奨案を提示する。<\u002Fp>\n              <div class=\"byline\">\n                <span class=\"agent-badge\"><span class=\"agent-avatar\">AI<\u002Fspan>Workbench Agent が生成<\u002Fspan>\n                <span class=\"muted\">人手レビュー: 佐藤・田中・高橋・鈴木<\u002Fspan>\n              <\u002Fdiv>\n\n              <!-- GENERATED METADATA -->\n              <div class=\"meta-grid\" aria-label=\"生成メタデータ\">\n                <div class=\"meta-cell\"><div class=\"meta-key\">生成日時<\u002Fdiv><div class=\"meta-val mono\">2026-06-11 13:58 JST<\u002Fdiv><\u002Fdiv>\n                <div class=\"meta-cell\"><div class=\"meta-key\">モデル<\u002Fdiv><div class=\"meta-val mono\">research-agent v4.2<\u002Fdiv><\u002Fdiv>\n                <div class=\"meta-cell\"><div class=\"meta-key\">調査ソース<\u002Fdiv><div class=\"meta-val\">38 件 <span class=\"mono\">(一次 12)<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"meta-cell\"><div class=\"meta-key\">所要時間<\u002Fdiv><div class=\"meta-val mono\">6m 41s<\u002Fdiv><\u002Fdiv>\n                <div class=\"meta-cell\"><div class=\"meta-key\">信頼度<\u002Fdiv><div class=\"meta-val\"><span class=\"confidence\"><span class=\"bar fill\"><\u002Fspan><span class=\"bar fill\"><\u002Fspan><span class=\"bar fill\"><\u002Fspan><span class=\"bar fill\"><\u002Fspan><span class=\"bar\"><\u002Fspan><\u002Fspan> 中〜高<\u002Fdiv><\u002Fdiv>\n                <div class=\"meta-cell\"><div class=\"meta-key\">版<\u002Fdiv><div class=\"meta-val mono\">rev.3 / 確定前<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- SUMMARY / TL;DR -->\n              <section class=\"summary\">\n                <div class=\"summary-h\">\n                  <svg class=\"icon\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M3 4h10M3 8h10M3 12h6\"><\u002Fpath><\u002Fsvg>\n                  要約 (TL;DR)\n                <\u002Fdiv>\n                <p>4 候補（ClickHouse / BigQuery / Snowflake / DuckDB）のうち、<strong>当社のクエリ支配的なワークロードと月額予算（〜¥45万）では ClickHouse を推奨<\u002Fstrong>。既存 Postgres を OLTP として残し、CDC で ClickHouse に取り込む併用構成とする。<\u002Fp>\n                <ul>\n                  <li>集計クエリの P95 は現行比 <strong>11〜18 倍<\u002Fstrong> 改善（§5 検証ログ）。<\u002Fli>\n                  <li>月額試算は最安だが、運用負荷とマネージド度は中程度（要 SRE 体制）。<\u002Fli>\n                  <li>フルマネージドを最優先する場合は BigQuery が次点。<\u002Fli>\n                <\u002Ful>\n              <\u002Fsection>\n\n              <div class=\"prose autonum\" id=\"prose\" data-screen-label=\"Document body\">\n                <h2 id=\"s1\">背景と課題<\u002Fh2>\n                <h3>現行基盤の状況<\u002Fh3>\n                <p>現行の分析基盤は OLTP 用の Postgres を相乗りで利用しており、データ量の増加に伴い分析クエリと業務トランザクションが競合している。特に <span class=\"cx\" data-comment=\"c1\" data-state=\"open\">オンプレ Postgres では月次バッチが SLA を逸脱し始めている<span class=\"cx-num\">1<\u002Fspan><\u002Fspan>状況で、四半期の経営レポート生成が平均 42 分かかっている<sup class=\"cite\">[3]<\u002Fsup>。<\u002Fp>\n                <h3>調査の前提と制約<\u002Fh3>\n                <p>本調査では、列指向の分析特化エンジンへ分析ワークロードを切り出すことを前提に、<strong>初期コスト・運用負荷・既存資産との接続性<\u002Fstrong>を主要な制約として候補を評価する。<\u002Fp>\n                <h4>対象データとワークロード<\u002Fh4>\n                <ul>\n                  <li>対象データ量: 常時 <code>~4 TB<\u002Fcode>、月間スキャン <code>~12 TB<\u002Fcode>。<\u002Fli>\n                  <li>主要ワークロード: ダッシュボード集計（高頻度・低レイテンシ要求）。<\u002Fli>\n                <\u002Ful>\n                <h4>既存環境の制約<\u002Fh4>\n                <ul>\n                  <li>制約: 既存 BI ツール（Metabase / Looker）との互換、SQL 資産の流用。<\u002Fli>\n                <\u002Ful>\n\n                <!-- §2 -->\n                <h2 id=\"s2\">評価方法と軸<\u002Fh2>\n                <h3>テストデータセット<\u002Fh3>\n                <p>各候補に対し、代表的な集計クエリ 14 本・取込ジョブ 3 本を同一データセット（TPC-DS 100GB 相当 + 自社サンプル）で実行し、レイテンシ・スループット・月額コストを実測した。定性軸は 5 段階で評価している。<\u002Fp>\n                <h3>評価軸の重み<\u002Fh3>\n                <p>意思決定では <strong>クエリ性能（集計）と月額コストを最重視<\u002Fstrong>し、運用負荷を次点に置いた。マネージド度は「SRE が 1 名で運用可能か」を基準に判定している。<\u002Fp>\n                <h4>定量指標の算出方法<\u002Fh4>\n                <p>レイテンシは P95、スループットは 60 秒間の完了クエリ数で測定し、各 5 回試行の中央値を採用した。月額コストは後述（§4）の前提に基づく税抜試算。<\u002Fp>\n                <h4>定性指標の評点基準<\u002Fh4>\n                <p>運用負荷・ロックイン・学習コストは、社内の運用実績とドキュメント整備度をもとに 5 段階で相対評価している。<\u002Fp>\n\n                <!-- §3 COMPARISON TABLE -->\n                <h2 id=\"s3\">候補の比較<\u002Fh2>\n                <p>横スクロールで全候補を比較できる。緑の列が推奨候補。評価は ●＝高 で 5 段階。<\u002Fp>\n\n                <div class=\"table-wrap\">\n                  <div class=\"table-cap\">\n                    <span><span class=\"t-no\">表 1<\u002Fspan> &nbsp; <span class=\"t-title\">OLAP エンジン 4 製品 比較マトリクス<\u002Fspan><\u002Fspan>\n                    <span>実測 14 クエリ平均 · 2026-06 時点<\u002Fspan>\n                  <\u002Fdiv>\n                  <div class=\"table-scroll\">\n                    <table class=\"cmp\">\n                      <colgroup><col><col class=\"pick\"><col><col><col><\u002Fcolgroup>\n                      <thead>\n                        <tr>\n                          <th class=\"axis\">評価軸<\u002Fth>\n                          <th class=\"pick\">ClickHouse <span class=\"axis-sub\" style=\"color:inherit\">推奨<\u002Fspan><\u002Fth>\n                          <th>BigQuery<\u002Fth>\n                          <th>Snowflake<\u002Fth>\n                          <th>DuckDB<\u002Fth>\n                        <\u002Ftr>\n                      <\u002Fthead>\n                      <tbody>\n                        <tr>\n                          <td class=\"axis\">集計クエリ性能<span class=\"axis-sub\">P95 latency<\u002Fspan><\u002Ftd>\n                          <td class=\"pick\"><span class=\"rate good r5\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note num\">0.9s<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r4\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note num\">1.6s<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r4\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note num\">1.9s<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate mid r3\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note num\">単一ノード<\u002Fspan><\u002Ftd>\n                        <\u002Ftr>\n                        <tr>\n                          <td class=\"axis\">大規模スキャン<span class=\"axis-sub\">12TB/月<\u002Fspan><\u002Ftd>\n                          <td class=\"pick\"><span class=\"rate good r4\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r5\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r4\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate low r2\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><\u002Ftd>\n                        <\u002Ftr>\n                        <tr>\n                          <td class=\"axis\"><span class=\"cx\" data-comment=\"c2\" data-state=\"reply\">月額試算（コスト）<span class=\"cx-num\">2<\u002Fspan><\u002Fspan><span class=\"axis-sub\">当社想定負荷<\u002Fspan><\u002Ftd>\n                          <td class=\"pick\"><strong class=\"num\">¥285k<\u002Fstrong><span class=\"tag-cell-note\">自前運用 / IaaS<\u002Fspan><\u002Ftd>\n                          <td><strong class=\"num\">¥410k<\u002Fstrong><span class=\"tag-cell-note\">従量・スキャン課金<\u002Fspan><\u002Ftd>\n                          <td><strong class=\"num\">¥520k<\u002Fstrong><span class=\"tag-cell-note\">クレジット定額<\u002Fspan><\u002Ftd>\n                          <td><strong class=\"num\">¥40k<\u002Fstrong><span class=\"tag-cell-note\">単一インスタンス<\u002Fspan><\u002Ftd>\n                        <\u002Ftr>\n                        <tr>\n                          <td class=\"axis\">運用負荷<span class=\"axis-sub\">SRE 工数<\u002Fspan><\u002Ftd>\n                          <td class=\"pick\"><span class=\"rate mid r3\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">クラスタ自前<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r5\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">フルマネージド<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r5\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">フルマネージド<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate mid r3\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">組込・小規模<\u002Fspan><\u002Ftd>\n                        <\u002Ftr>\n                        <tr>\n                          <td class=\"axis\">スケーラビリティ<\u002Ftd>\n                          <td class=\"pick\"><span class=\"rate good r4\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">水平・手動<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r5\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">自動<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r5\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">自動<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate low r1\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">単一ノード<\u002Fspan><\u002Ftd>\n                        <\u002Ftr>\n                        <tr>\n                          <td class=\"axis\">BI 連携<span class=\"axis-sub\">Metabase/Looker<\u002Fspan><\u002Ftd>\n                          <td class=\"pick\"><span class=\"tag-yes\">対応<\u002Fspan><\u002Ftd>\n                          <td><span class=\"tag-yes\">対応<\u002Fspan><\u002Ftd>\n                          <td><span class=\"tag-yes\">対応<\u002Fspan><\u002Ftd>\n                          <td><span class=\"tag-no\">限定的<\u002Fspan><\u002Ftd>\n                        <\u002Ftr>\n                        <tr>\n                          <td class=\"axis\">ベンダーロックイン<\u002Ftd>\n                          <td class=\"pick\"><span class=\"rate good r5\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">OSS / 低<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate low r2\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">GCP 依存<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate low r2\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">高<\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r5\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><span class=\"tag-cell-note\">OSS / 低<\u002Fspan><\u002Ftd>\n                        <\u002Ftr>\n                        <tr>\n                          <td class=\"axis\">学習コスト<\u002Ftd>\n                          <td class=\"pick\"><span class=\"rate mid r3\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r4\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r4\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><\u002Ftd>\n                          <td><span class=\"rate good r5\"><span class=\"pips\"><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><i class=\"pip\"><\u002Fi><\u002Fspan><\u002Fspan><\u002Ftd>\n                        <\u002Ftr>\n                      <\u002Ftbody>\n                    <\u002Ftable>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- §4 COST + CALLOUT -->\n                <h2 id=\"s4\">コスト試算の前提<\u002Fh2>\n                <h3>ワークロード想定<\u002Fh3>\n                <p>月額はいずれも <strong>スキャン 12 TB/月・ストレージ 4 TB 常時・同時実行 8<\u002Fstrong> を前提に試算した。クエリ量が支配的なワークロードのため、スキャン従量・クレジット定額型は相対的に割高になる。<\u002Fp>\n\n                <div class=\"callout warn\">\n                  <div class=\"co-ico\">!<\u002Fdiv>\n                  <div>\n                    <div class=\"co-title\">注意 — 自前運用の隠れコスト<\u002Fdiv>\n                    <div class=\"co-body\"><p>ClickHouse の月額には SRE 工数（試算 0.3 人月）を含めていない。マネージド ClickHouse Cloud を選ぶ場合、月額は約 <strong>¥420k<\u002Fstrong> に上昇し BigQuery と拮抗する。<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div class=\"callout info\">\n                  <div class=\"co-ico\">i<\u002Fdiv>\n                  <div>\n                    <div class=\"co-title\">補足 — 為替前提<\u002Fdiv>\n                    <div class=\"co-body\"><p>USD 建て課金は <code>¥158/USD<\u002Fcode> で換算。為替変動 ±10% で BigQuery / Snowflake の順位は変わらない。<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- §5 CODE / LOG -->\n                <h2 id=\"s5\">検証ログ<\u002Fh2>\n                <h3>クエリベンチマーク<\u002Fh3>\n                <p>代表クエリ（日次 GMV 集計）の実行計画を示す。<\u002Fp>\n\n                <div class=\"code\">\n                  <div class=\"code-bar\"><span class=\"dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan><span class=\"fname\">benchmark_q07.sql<\u002Fspan><span class=\"lang\">SQL<\u002Fspan><\u002Fdiv>\n                  <pre class=\"code-body\"><span class=\"ln\" data-n=\"1\"><span class=\"tok-c\">-- 日次 GMV 集計 (直近 90 日, 1.2B rows)<\u002Fspan><\u002Fspan><span class=\"ln hl\" data-n=\"2\"><span class=\"tok-k\">SELECT<\u002Fspan> toDate(ordered_at) <span class=\"tok-k\">AS<\u002Fspan> d,<\u002Fspan><span class=\"ln\" data-n=\"3\">       <span class=\"tok-f\">sum<\u002Fspan>(amount) <span class=\"tok-k\">AS<\u002Fspan> gmv,<\u002Fspan><span class=\"ln\" data-n=\"4\">       <span class=\"tok-f\">uniqExact<\u002Fspan>(user_id) <span class=\"tok-k\">AS<\u002Fspan> buyers<\u002Fspan><span class=\"ln\" data-n=\"5\"><span class=\"tok-k\">FROM<\u002Fspan> orders<\u002Fspan><span class=\"ln\" data-n=\"6\"><span class=\"tok-k\">WHERE<\u002Fspan> ordered_at &gt;= now() - <span class=\"tok-n\">90<\u002Fspan><\u002Fspan><span class=\"ln\" data-n=\"7\"><span class=\"tok-k\">GROUP BY<\u002Fspan> d <span class=\"tok-k\">ORDER BY<\u002Fspan> d;<\u002Fspan><span class=\"ln\" data-n=\"8\"><span class=\"tok-c\">-- ClickHouse: 0.91s · Postgres(現行): 16.4s<\u002Fspan><\u002Fspan><\u002Fpre>\n                <\u002Fdiv>\n\n                <div class=\"code log\" style=\"margin-top:14px;\">\n                  <div class=\"code-bar\"><span class=\"dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan><span class=\"fname\">cdc_sync.log<\u002Fspan><span class=\"lang\">LOG · tail<\u002Fspan><\u002Fdiv>\n                  <div class=\"code-body\">\n                    <span class=\"log-line\"><span class=\"ts\">12:01:03.221<\u002Fspan> <span class=\"lvl info\">INFO <\u002Fspan> debezium: snapshot complete, switching to streaming<\u002Fspan>\n                    <span class=\"log-line\"><span class=\"ts\">12:01:04.880<\u002Fspan> <span class=\"lvl ok\">OK   <\u002Fspan> sink=clickhouse batch=2048 rows flushed in 142ms<\u002Fspan>\n                    <span class=\"log-line\"><span class=\"ts\">12:01:07.512<\u002Fspan> <span class=\"lvl info\">INFO <\u002Fspan> lag.p50=3.1s lag.p95=8.0s lag.max=11.4s<\u002Fspan>\n                    <span class=\"log-line is-warn\"><span class=\"ts\">12:01:09.004<\u002Fspan> <span class=\"lvl warn\">WARN <\u002Fspan> backpressure: consumer slower than producer (queue=1.8k)<\u002Fspan>\n                    <span class=\"log-line\"><span class=\"ts\">12:01:12.770<\u002Fspan> <span class=\"lvl ok\">OK   <\u002Fspan> queue drained, lag.p95=8.0s within SLA(&lt;15s)<\u002Fspan>\n                    <span class=\"log-line is-err\"><span class=\"ts\">12:03:41.119<\u002Fspan> <span class=\"lvl err\">ERROR<\u002Fspan> retryable: schema drift on `orders.coupon_code` (null→str) — auto-cast applied<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- §6 DIAGRAM + IMAGE -->\n                <h2 id=\"s6\">アーキテクチャ案<\u002Fh2>\n                <h3>併用構成の概要<\u002Fh3>\n                <p>OLTP（Postgres）を残し、CDC で ClickHouse に取り込む併用構成。BI は ClickHouse を参照する。<\u002Fp>\n\n                <!-- DIAGRAM FALLBACK -->\n                <div class=\"diagram-fallback\" data-comment=\"c4\" id=\"c4\" data-cstate-host=\"\">\n                  <div class=\"df-head\">\n                    <span class=\"df-badge\">DIAGRAM FALLBACK<\u002Fspan>\n                    <span class=\"cx\" data-comment=\"c4\" data-state=\"open\" style=\"font-family:var(--font-mono)\">アーキテクチャ概念図<span class=\"cx-num\">4<\u002Fspan><\u002Fspan>\n                    <span>· mermaid のレンダリングに失敗したため簡易表示<\u002Fspan>\n                  <\u002Fdiv>\n                  <div class=\"flow\">\n                    <div class=\"node\"><div class=\"n-t\">App<\u002Fdiv><div class=\"n-s\">OLTP write<\u002Fdiv><\u002Fdiv>\n                    <div class=\"arrow\">→<\u002Fdiv>\n                    <div class=\"node\"><div class=\"n-t\">Postgres<\u002Fdiv><div class=\"n-s\">source of truth<\u002Fdiv><\u002Fdiv>\n                    <div class=\"arrow\">→<\u002Fdiv>\n                    <div class=\"node\"><div class=\"n-t\">Debezium<\u002Fdiv><div class=\"n-s\">CDC<\u002Fdiv><\u002Fdiv>\n                    <div class=\"arrow\">→<\u002Fdiv>\n                    <div class=\"node accent\"><div class=\"n-t\">ClickHouse<\u002Fdiv><div class=\"n-s\">OLAP<\u002Fdiv><\u002Fdiv>\n                    <div class=\"arrow\">→<\u002Fdiv>\n                    <div class=\"node\"><div class=\"n-t\">Metabase<\u002Fdiv><div class=\"n-s\">BI<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"df-raw\">原本: graph LR; App--&gt;Postgres--&gt;Debezium--&gt;ClickHouse--&gt;Metabase<\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- GENERATED IMAGE -->\n                <figure class=\"figure\">\n                  <div class=\"gen-image\">\n                    <span class=\"gi-tag\">generated-image · arch_overview.png<\u002Fspan>\n                    <div class=\"gi-center\">アーキテクチャ概念図（生成画像）<span class=\"gi-dim\">1600 × 850 · 画像をここに配置<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                  <figcaption><span class=\"fc-no\">図 2<\u002Fspan>エージェント生成のアーキテクチャ概念図。実装時は確定版に差し替える。<\u002Ffigcaption>\n                <\u002Ffigure>\n\n                <!-- §7 CONCLUSION -->\n                <h2 id=\"s7\">推奨と結論<\u002Fh2>\n                <p>当社のクエリ支配的ワークロードと予算制約のもとでは、<span class=\"cx\" data-comment=\"c3\" data-state=\"resolved\">推奨は ClickHouse + 既存 Postgres の併用<span class=\"cx-num\">3<\u002Fspan><\u002Fspan>とする。CDC 同期遅延は P95 8 秒で SLA 内に収まることを確認済み（§5）。<\u002Fp>\n                <div class=\"reco\">\n                  <div class=\"reco-tag\">✓ 推奨<\u002Fdiv>\n                  <p><strong>ClickHouse（自前運用）+ Postgres CDC 併用。<\u002Fstrong>初期は IaaS 上の 3 ノード構成で開始し、SRE 体制が整い次第マネージドへの移行を再評価する。フルマネージド最優先なら BigQuery を次点とする。<\u002Fp>\n                <\u002Fdiv>\n                <p style=\"color:var(--ink-3); font-size:var(--fs-small); margin-top:var(--sp-5);\">出典: [3] 社内 SLA ダッシュボード 2026Q1 / ベンチマークは付録 A 参照。<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n\n          <!-- COMMENT RAIL -->\n          <aside class=\"cmt-rail\" aria-label=\"レビューコメント\">\n            <div class=\"cmt-rail-h\">\n              <span>レビュー<\u002Fspan>\n              <span class=\"cmt-rail-count\" id=\"cmtCount\">—<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"cmt-layer\" id=\"cmtLayer\"><\u002Fdiv>\n          <\u002Faside>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================\n         VIEW 2 · MOBILE\n         ============================================================ -->\n    <section class=\"view\" id=\"viewMobile\" data-screen-label=\"Mobile document\">\n      <div class=\"mobile-stage\">\n        <p class=\"mobile-note\">モバイルでは右マージンを廃し、コメントは該当ブロックの直下にインライン展開する折りたたみスレッドに切り替わる。表は横スクロール、比較軸（先頭列）は固定。<\u002Fp>\n        <div class=\"phone\">\n          <div class=\"phone-screen\">\n            <div class=\"phone-notch\"><\u002Fdiv>\n            <div class=\"m-statusbar\"><span>9:41<\u002Fspan><span class=\"m-icons\">●●● ▮▮▮ ▮<\u002Fspan><\u002Fdiv>\n            <div class=\"m-topbar\">\n              <span class=\"m-back\">‹<\u002Fspan>\n              <span class=\"m-title\">次期データ基盤 選定調査<\u002Fspan>\n              <span class=\"m-rev\">レビュー 4<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"m-scroll\">\n              <p class=\"eyebrow\">技術選定レポート<\u002Fp>\n              <h1 class=\"doc-title\">次期データ基盤 — ストレージ / クエリエンジン選定調査<\u002Fh1>\n              <p class=\"doc-deck\">Postgres の分析逼迫を受け、OLAP 移行候補 4 製品を比較し推奨案を提示する。<\u002Fp>\n
